<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Redirecting to the latest PCSensei experience.">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="refresh" content="0; url=/frontend/main.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="PCSensei | Redirecting">
    <meta property="og:description" content="Redirecting to the latest PCSensei experience.">
    <meta property="og:url" content="/main.html">
    <link rel="canonical" href="/main.html">
    <link rel="icon" href="/frontend/assets/icons/favicon.svg" type="image/svg+xml">
    <title>PCSensei | Redirecting</title>
    <style>
        :root {
            color-scheme: light;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #e0e7ff 0%, #f8fafc 45%, #e2e8f0 100%);
            color: #0f172a;
        }
        .card {
            width: min(560px, 100%);
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
            padding: 28px;
        }
        h1 {
            margin: 0 0 10px;
            font-size: 1.35rem;
        }
        p {
            margin: 0 0 12px;
            color: #475569;
            line-height: 1.55;
        }
        a {
            color: #1d4ed8;
            font-weight: 600;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>PCSensei | Redirecting</h1>
        <p>Taking you to the latest PCSensei experience.</p>
        <p>If you are not redirected automatically, <a id="continue-link" href="/frontend/main.html">continue to PCSensei</a>.</p>
    </main>
    <script>
        (function () {
            var query = window.location.search || "";
            var hash = window.location.hash || "";
            var target = "/frontend/main.html" + query + hash;
            try {
                var params = new URLSearchParams(query);
                if (params.get("page") === "wizard") {
                    target = "/premium-wizard/index.html" + hash;
                }
            } catch (error) {
                console.warn("Redirect query parse failed:", error && error.message ? error.message : error);
            }
            var link = document.getElementById("continue-link");
            if (link) {
                link.setAttribute("href", target);
            }
            window.location.replace(target);
        })();
    </script>
    <noscript>
        <p style="text-align:center; margin-top:12px;">
            JavaScript is disabled. <a href="/frontend/main.html">Open PCSensei</a>.
        </p>
    </noscript>
</body>
</html>
